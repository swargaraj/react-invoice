packages:
  - apps/*
  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^6.0.0
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.3
  tailwindcss: ^4.3.1
  "@tailwindcss/vite": ^4.3.1
  cnfast: ^0.0.8
  "@fontsource/geist-mono": ^5.2.8
  "@fontsource/geist-sans": ^5.2.5
  "@fontsource/inter": ^5.2.8
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  shadcn: ^4.12.0
  class-variance-authority: ^0.7.1
  tw-animate-css: ^1.4.0
  "@base-ui/react": ^1.6.0
  "@hugeicons/react": ^1.1.9
  "@hugeicons/core-free-icons": ^4.2.2
  "@fontsource-variable/geist": ^5.2.9
  shiki: ^4.3.0
  "@fontsource-variable/geist-mono": ^5.2.8
  react-router-dom: ^7.18.0
  react-router: ^8.0.1
  motion: ^12.42.0
  modern-monaco: ^0.4.2
  "@shikijs/langs": ^4.3.0
  "@shikijs/themes": ^4.3.0
  "@codesandbox/sandpack-react": ^2.2.0
  sucrase: ^3.35.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  es5-ext: true
minimumReleaseAgeExclude:
  - react-invoice@0.1.2 || 0.1.3
